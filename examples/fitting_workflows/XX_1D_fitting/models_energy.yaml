# Use these models to describe the energy-dependent data
# For available functions see: /src/trspecfit/functions/energy.py

# Ground state
# (most parameters vary here)
base:
    LinBack:
      m: [1E-2, True, -1, 1]
      b: [0, True, -5, 5]
      xStart: [0, False]
      xStop: [20, False]
    GLP:
      A: [10, True, 5, 15]
      x0: [8, True, 5, 15]
      F: [1.5, True, 0.75, 2.5]
      m: [0.3, True, 0, 1]

# Slice-by-Slice model fit
# (pinned parameters will be set to "base" Model fit result values)
SbS:
    LinBack:
      m: [1E-2, False]
      b: [0, False]
      xStart: [0, False]
      xStop: [20, False]
    GLP:
      A: [12, False]
      x0: [8, True, 5, 15]
      F: [1.5, False]
      m: [0.3, False]

# 2D model fit
# (pinned parameters will be set to "base" Model fit result values)
2D:
    LinBack:
      m: [1E-2, False]
      b: [0, False]
      xStart: [0, False]
      xStop: [20, False]
    GLP:
      A: [12, False]
      x0: [8, True, 5, 15]
      F: [1.5, False]
      m: [0.3, False]
